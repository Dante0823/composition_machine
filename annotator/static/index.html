<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>악보 크롭 · 어노테이터</title>
    <link rel="stylesheet" href="/static/style.css?v=3" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-head">
          <h1>악보 크롭</h1>
          <div class="topbar-actions-group">
            <div class="topbar-actions crop-only">
              <button type="button" id="btn-clear" class="btn secondary">박스 전체 삭제</button>
              <button type="button" id="btn-submit" class="btn primary">제출 · 크롭 저장</button>
            </div>
            <div class="topbar-actions tag-only">
              <button type="button" id="btn-save-tag" class="btn primary">코드 저장</button>
            </div>
          </div>
        </div>
        <nav class="mode-nav" aria-label="작업 단계">
          <button type="button" class="mode-nav__btn is-active" data-mode="page_staff">
            Page → Staff
          </button>
          <button type="button" class="mode-nav__btn" data-mode="staff_measure">
            Staff → Measure
          </button>
          <button type="button" class="mode-nav__btn" data-mode="measure_note">
            Measure → Note
          </button>
          <button type="button" class="mode-nav__btn" data-mode="function_in_page">
            Functions in Page
          </button>
          <button type="button" class="mode-nav__btn" data-mode="function_in_staff">
            Functions in Staff
          </button>
          <button type="button" class="mode-nav__btn" data-mode="function_in_measure">
            Functions in Measure
          </button>
          <button type="button" class="mode-nav__btn" data-mode="function_in_note">
            Functions in Note
          </button>
        </nav>
        <nav class="mode-nav mode-nav--section" aria-label="Strudel Code">
          <button type="button" class="mode-nav__btn" data-mode="code_of_page">
            Code of Page
          </button>
          <button type="button" class="mode-nav__btn" data-mode="code_of_staff">
            Code of Staff
          </button>
          <button type="button" class="mode-nav__btn" data-mode="code_of_measure">
            Code of Measure
          </button>
          <button type="button" class="mode-nav__btn" data-mode="code_of_note">
            Code of Note
          </button>
        </nav>
        <nav class="mode-nav mode-nav--section" aria-label="Function Tag">
          <button type="button" class="mode-nav__btn" data-mode="tag_of_page_function">
            Tag of Page Function
          </button>
          <button type="button" class="mode-nav__btn" data-mode="tag_of_staff_function">
            Tag of Staff Function
          </button>
          <button type="button" class="mode-nav__btn" data-mode="tag_of_measure_function">
            Tag of Measure Function
          </button>
          <button type="button" class="mode-nav__btn" data-mode="tag_of_note_function">
            Tag of Note Function
          </button>
        </nav>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <label for="image-select">이미지 (<span id="source-folder-label">source/pages</span>)</label>
        <select id="image-select"></select>
        <div class="tag-panel tag-only">
          <label for="strudel-code" id="tag-input-label">Strudel Code</label>
          <textarea
            id="strudel-code"
            class="strudel-code"
            rows="14"
            spellcheck="false"
            placeholder="Strudel 코드를 입력하세요…"
          ></textarea>
        </div>
        <label for="zoom-slider" class="zoom-label-row">
          표시 크기 <span id="zoom-value" class="zoom-value">100%</span>
        </label>
        <div class="zoom-controls">
          <div class="zoom-bar">
            <button type="button" id="btn-zoom-out" class="btn secondary" title="축소">−</button>
            <input type="range" id="zoom-slider" min="25" max="400" step="5" value="100" />
            <button type="button" id="btn-zoom-in" class="btn secondary" title="확대">+</button>
          </div>
          <button type="button" id="btn-zoom-fit" class="btn secondary full" title="작업 영역 너비에 맞춤">
            작업 패널에 맞춤
          </button>
        </div>
        <p id="status" class="status"></p>
        <ul id="hint" class="hint"></ul>
        <button type="button" id="btn-delete-selected" class="btn secondary full crop-only">
          선택 박스 삭제
        </button>
      </aside>

      <section class="workspace">
        <div id="stage" class="stage">
          <img id="photo" alt="" draggable="false" />
          <canvas id="overlay"></canvas>
        </div>
      </section>
    </main>

    <script src="/static/app.js?v=3"></script>
  </body>
</html>
