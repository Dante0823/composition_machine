<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>악보 크롭 · 어노테이터</title>
    <link rel="stylesheet" href="/static/style.css?v=14" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-head">
          <h1>악보 어노테이터</h1>
          <div class="topbar-actions-group">
            <div class="topbar-actions crop-only">
              <button type="button" id="btn-clear" class="btn secondary">박스 전체 삭제</button>
              <button type="button" id="btn-delete-selected" class="btn secondary">선택 박스 삭제</button>
              <button type="button" id="btn-submit" class="btn primary">제출 · 크롭 저장</button>
            </div>
            <div class="topbar-actions tag-only">
              <button type="button" id="btn-save-tag" class="btn primary">코드 저장</button>
            </div>
          </div>
        </div>
        <div class="mode-group-nav" role="tablist" aria-label="기능 그룹">
          <button type="button" class="mode-group-nav__btn is-active" data-group="crop">크롭</button>
          <button type="button" class="mode-group-nav__btn" data-group="tag">태깅</button>
        </div>
        <nav class="mode-nav crop-group-only" aria-label="크롭">
          <button type="button" class="mode-nav__btn is-active" data-mode="page_staff">Page → Staff</button>
          <button type="button" class="mode-nav__btn" data-mode="staff_measure">Staff → Measure</button>
          <button type="button" class="mode-nav__btn" data-mode="measure_note">Measure → Note</button>
          <button type="button" class="mode-nav__btn" data-mode="function_in_page">Functions in Page</button>
          <button type="button" class="mode-nav__btn" data-mode="function_in_staff">Functions in Staff</button>
          <button type="button" class="mode-nav__btn" data-mode="function_in_measure">Functions in Measure</button>
          <button type="button" class="mode-nav__btn" data-mode="function_in_note">Functions in Note</button>
        </nav>
        <nav class="mode-nav tag-group-only" aria-label="태깅" hidden>
          <button type="button" class="mode-nav__btn" data-mode="meta_of_work">PDF Work Meta</button>
          <button type="button" class="mode-nav__btn" data-mode="code_of_page">Code of Page</button>
          <button type="button" class="mode-nav__btn" data-mode="code_of_staff">Code of Staff</button>
          <button type="button" class="mode-nav__btn" data-mode="code_of_measure">Code of Measure</button>
          <button type="button" class="mode-nav__btn" data-mode="code_of_note">Code of Note</button>
          <button type="button" class="mode-nav__btn" data-mode="tag_of_page_function">Tag of Page Function</button>
          <button type="button" class="mode-nav__btn" data-mode="tag_of_staff_function">Tag of Staff Function</button>
          <button type="button" class="mode-nav__btn" data-mode="tag_of_measure_function">Tag of Measure Function</button>
          <button type="button" class="mode-nav__btn" data-mode="tag_of_note_function">Tag of Note Function</button>
        </nav>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar sidebar--list">
        <div class="sidebar-head">
          <span class="sidebar-title">이미지 목록</span>
          <span class="sidebar-source"><span id="source-folder-label">source/pages</span></span>
        </div>
        <nav id="image-tree-breadcrumb" class="image-tree-breadcrumb" aria-label="경로"></nav>
        <div class="image-list-wrap">
          <ul id="image-tree-list" class="image-tree-list" role="tree" aria-label="작업 이미지 목록"></ul>
          <p id="image-list-empty" class="image-list-empty" hidden>이미지가 없습니다.</p>
        </div>
      </aside>

      <section class="workspace">
        <div id="stage" class="stage">
          <img id="photo" alt="" draggable="false" />
          <canvas id="overlay"></canvas>
          <embed id="pdf-viewer" class="pdf-viewer" type="application/pdf" title="악보 PDF" hidden />
        </div>
      </section>

      <aside class="panel-sidebar crop-only">
        <div class="panel-block">
          <label for="zoom-slider" class="panel-label zoom-label-row">
            표시 크기 <span id="zoom-value" class="zoom-value">100%</span>
          </label>
          <div class="zoom-controls">
            <div class="zoom-bar">
              <button type="button" id="btn-zoom-out" class="btn secondary" title="축소">−</button>
              <input type="range" id="zoom-slider" min="25" max="400" step="5" value="100" />
              <button type="button" id="btn-zoom-in" class="btn secondary" title="확대">+</button>
            </div>
            <button type="button" id="btn-zoom-fit" class="btn secondary full" title="작업 영역 너비에 맞춤">
              작업 패널에 맞춤
            </button>
          </div>
        </div>
        <div class="panel-block panel-block--log">
          <span class="panel-label">작업 로그</span>
          <div id="log-panel" class="log-panel" aria-live="polite"></div>
        </div>
      </aside>

      <aside class="panel-sidebar tag-only">
        <div class="panel-block panel-block--tag tag-code-input">
          <label for="strudel-code" id="tag-input-label" class="panel-label">Strudel Code</label>
          <textarea
            id="strudel-code"
            class="strudel-code"
            rows="10"
            spellcheck="false"
            placeholder="Strudel 코드를 입력하세요…"
          ></textarea>
        </div>
        <div class="panel-block panel-block--tag catalog-input" hidden>
          <div class="catalog-upload">
            <span class="panel-label">PDF 업로드</span>
            <label class="catalog-field">
              <span class="catalog-field__label">Work ID</span>
              <input type="text" id="upload-work-id" autocomplete="off" placeholder="sheet_music_02" spellcheck="false" />
            </label>
            <label class="catalog-field">
              <span class="catalog-field__label">PDF 파일</span>
              <input type="file" id="upload-pdf-file" accept=".pdf,application/pdf" />
            </label>
            <button type="button" id="btn-upload-pdf" class="btn primary full">PDF 업로드 · 페이지 변환</button>
          </div>
          <span class="panel-label">Work 메타데이터</span>
          <form id="catalog-form" class="catalog-form">
            <label class="catalog-field">
              <span class="catalog-field__label">악보 실제 이름</span>
              <input type="text" id="cat-title" name="title" autocomplete="off" />
            </label>
            <label class="catalog-field">
              <span class="catalog-field__label">악보 실제 부제</span>
              <input type="text" id="cat-subtitle" name="subtitle" autocomplete="off" />
            </label>
            <label class="catalog-field">
              <span class="catalog-field__label">표시할 이름</span>
              <input type="text" id="cat-display-title" name="display_title" autocomplete="off" />
            </label>
            <label class="catalog-field">
              <span class="catalog-field__label">작곡가 (실제 이름)</span>
              <input type="text" id="cat-composer" name="composer" autocomplete="off" />
            </label>
            <label class="catalog-field">
              <span class="catalog-field__label">작곡가 (표시할 이름)</span>
              <input type="text" id="cat-display-composer" name="display_composer" autocomplete="off" />
            </label>
            <fieldset class="catalog-field catalog-field--radio">
              <legend class="catalog-field__label">저작권 자유 여부</legend>
              <label class="catalog-radio">
                <input type="radio" name="copyright_free" value="true" />
                자유 (사용 가능)
              </label>
              <label class="catalog-radio">
                <input type="radio" name="copyright_free" value="false" />
                사용 불가
              </label>
            </fieldset>
            <label class="catalog-field">
              <span class="catalog-field__label">분석 내용</span>
              <textarea id="cat-analysis" name="analysis" rows="6" spellcheck="false"></textarea>
            </label>
          </form>
        </div>
        <div class="panel-block panel-block--log">
          <span class="panel-label">작업 로그</span>
          <div id="tag-log-panel" class="log-panel" aria-live="polite"></div>
        </div>
      </aside>
    </main>

    <script src="/static/app.js?v=14"></script>
  </body>
</html>
